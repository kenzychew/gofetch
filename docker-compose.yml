services:
  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      QDRANT_URL: "http://qdrant:6333"
    depends_on:
      - qdrant
    volumes:
      - ./data:/app/data
      - bm25_index:/app/bm25_index
      - graph_data:/app/graph_data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uv", "run", "python", "ui/app.py"]
    ports:
      - "7860:7860"
    environment:
      BACKEND_URL: "http://backend:8000"
    depends_on:
      - backend

volumes:
  qdrant_storage:
  bm25_index:
  graph_data:
