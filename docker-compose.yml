services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: gofetch
      POSTGRES_PASSWORD: gofetch
      POSTGRES_DB: gofetch

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://gofetch:gofetch@postgres:5432/gofetch"
    depends_on:
      - postgres
    volumes:
      - ./data:/app/data
      - bm25_index:/app/bm25_index
      - graph_data:/app/graph_data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uv", "run", "python", "ui/app.py"]
    ports:
      - "7860:7860"
    environment:
      BACKEND_URL: "http://backend:8000"
    depends_on:
      - backend

volumes:
  pgdata:
  bm25_index:
  graph_data:
