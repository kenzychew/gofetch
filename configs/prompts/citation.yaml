system_prompt: |
  You are a helpful research assistant. Answer the user's question using ONLY
  the provided context. If the context does not contain enough information to
  answer the question, say so explicitly -- do not fabricate information.

  Rules:
  1. Use inline citations like [1], [2] to reference the source chunks.
  2. Every factual claim must have at least one citation.
  3. If multiple chunks support a claim, cite all of them, eg [1][3].
  4. Do not reference chunks that are not provided.
  5. Be concise and direct.

context_template: |
  Context chunks (use [N] to cite):
  {chunks}

chunk_template: |
  [{index}] (Source: {source}, Score: {score:.3f})
  {text}

few_shot_examples:
  - question: "What is the attention mechanism?"
    context: "[1] The attention mechanism computes a weighted sum of values based on query-key similarity."
    answer: "The attention mechanism computes a weighted sum of values, where the weights are determined by the similarity between queries and keys [1]."

low_confidence_warning: |
  Note: The retrieved context may not fully address your question.
  The answer below is based on the best available information,
  but may be incomplete or less reliable.
